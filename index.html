<style>
:root{
  --bg-0:#050505;
  --bg-1:#141414;
  --ink-0:#ffffff;
  --ink-1:#c9c9c9;
  --ink-2:#8a8a8a;
  --line:rgba(255,255,255,.14);
  --line-strong:rgba(255,255,255,.28);
  --glass:rgba(255,255,255,.055);
  --glass-hover:rgba(255,255,255,.1);
  --radius:20px;
  --sans:'Poppins',sans-serif;
  --arabic:'Tajawal','Poppins',sans-serif;
  --display:'Archivo Black','Poppins',sans-serif;
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  min-height:100vh;
  background:#000;
  color:var(--ink-0);
  font-family:var(--arabic);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ---------- Video Background ---------- */
.video-bg-container{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}

.video-bg-container video{
  position:absolute;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  width:auto;
  height:auto;
  transform:translate(-50%, -50%);
  object-fit:cover;
  z-index:0;
}

.video-overlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle at 50% 0%, rgba(28,28,28,0.7) 0%, rgba(10,10,10,0.85) 45%, rgba(0,0,0,0.95) 100%);
  pointer-events:none;
}

/* subtle textile weave texture on top of video */
.weave-bg{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.5;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.028) 0 1px, transparent 1px 11px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,.02) 0 1px, transparent 1px 11px);
}

.glow{
  position:fixed;
  z-index:1;
  border-radius:50%;
  filter:blur(90px);
  pointer-events:none;
}
.glow-a{
  width:480px;height:480px;
  top:-160px; left:-140px;
  background:rgba(255,255,255,.07);
  animation:drift 14s ease-in-out infinite;
}
.glow-b{
  width:420px;height:420px;
  bottom:-180px; right:-120px;
  background:rgba(255,255,255,.05);
  animation:driftB 17s ease-in-out infinite;
}

.stage{
  position:relative;
  z-index:2;
  max-width:480px;
  margin:0 auto;
  padding:56px 22px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* ---------- brand block ---------- */
.brand-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  margin-bottom:36px;
  animation:fadeDown .7s ease both;
}

.logo-ring{
  position:relative;
  width:118px;
  height:118px;
  border-radius:50%;
  padding:5px;
  margin-bottom:20px;
  background:linear-gradient(145deg, rgba(255,255,255,.35), rgba(255,255,255,.05) 40%, rgba(255,255,255,.25));
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 18px 40px -14px rgba(0,0,0,.85);
}
.logo-ring::before{
  content:"";
  position:absolute;
  inset:-7px;
  border-radius:50%;
  z-index:-1;
  background:conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,.55) 60deg, transparent 140deg, transparent 220deg, rgba(255,255,255,.35) 300deg, transparent 360deg);
  animation:haloSpin 6s linear infinite;
}
.logo-img{
  width:100%;
  height:100%;
  border-radius:50%;
  display:block;
  object-fit:cover;
  background:#0a0a0a;
}
.ring-shine{
  position:absolute;
  inset:0;
  border-radius:50%;
  box-shadow:inset 0 2px 6px rgba(255,255,255,.25), inset 0 -8px 16px rgba(0,0,0,.5);
  pointer-events:none;
}

.brand-name{
  font-family:var(--display);
  font-size:34px;
  letter-spacing:4px;
  margin:0 0 6px;
  color:var(--ink-0);
  background:linear-gradient(100deg,#ffffff 0%, #7a7a7a 25%, #ffffff 50%, #7a7a7a 75%, #ffffff 100%);
  background-size:200% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:textShimmer 5s linear infinite;
}

.brand-tagline{
  margin:0;
  font-family:var(--arabic);
  font-weight:400;
  font-size:14.5px;
  letter-spacing:.3px;
  color:var(--ink-2);
}

/* ---------- links ---------- */
.links{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.glass-link{
  --d:0;
  --accent:#ffffff;
  --accent-soft:rgba(255,255,255,.4);
  position:relative;
  display:flex;
  align-items:center;
  gap:16px;
  width:100%;
  padding:16px 18px;
  border-radius:var(--radius);
  background:var(--glass);
  border:1.5px solid var(--accent-soft);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  box-shadow:
    0 1px 0 rgba(255,255,255,.06) inset,
    0 10px 30px -18px rgba(0,0,0,.9),
    0 0 0 0 transparent;
  color:var(--ink-0);
  text-decoration:none;
  overflow:hidden;
  isolation:isolate;
  opacity:0;
  transform:translateY(14px);
  animation-name:riseIn, borderGlow;
  animation-duration:.6s, 3s;
  animation-timing-function:cubic-bezier(.2,.7,.2,1), ease-in-out;
  animation-iteration-count:1, infinite;
  animation-fill-mode:forwards, none;
  animation-delay:calc(.12s + var(--d) * .08s), calc(.7s + var(--d) * .2s);
  transition:background .25s ease, border-color .25s ease, transform .25s ease, box-shadow .25s ease;
}

.glass-link::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:-1;
  border-radius:inherit;
  background:linear-gradient(120deg, rgba(255,255,255,.16), transparent 40%);
  opacity:.6;
}

.link-ig{ --accent:#e0397e; --accent-soft:rgba(224,57,126,.4); }
.link-wa{ --accent:#25D366; --accent-soft:rgba(37,211,102,.4); }
.link-vb{ --accent:#8f5cf2; --accent-soft:rgba(143,92,242,.4); }
.link-call{ --accent:#2fd583; --accent-soft:rgba(47,213,131,.4); }
.link-maps{ --accent:#4285F4; --accent-soft:rgba(66,133,244,.4); }
.link-fb{ --accent:#1877F2; --accent-soft:rgba(24,119,242,.4); }

.glass-link:hover,
.glass-link:focus-visible{
  background:var(--glass-hover);
  border-color:var(--accent);
  transform:translateY(-3px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.08) inset,
    0 18px 34px -16px rgba(0,0,0,.95),
    0 0 24px -2px var(--accent);
  animation-play-state:paused, paused;
}

.glass-link:active{
  transform:translateY(-1px) scale(.99);
}

.link-icon{
  flex:0 0 auto;
  position:relative;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:13px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  color:var(--ink-0);
  transition:transform .35s cubic-bezier(.3,1.6,.4,1);
}
.link-icon svg{width:19px;height:19px; position:relative; z-index:1;}

.glass-link:hover .link-icon{
  transform:scale(1.12) rotate(-6deg);
}

/* ---- authentic brand colors per platform ---- */
.icon-ig{
  background:linear-gradient(135deg,#4f5bd5,#962fbf 30%,#d62976 55%,#fa7e1e 80%,#feda75);
  border-color:rgba(255,255,255,.25);
  color:#fff;
  --glow:rgba(214,41,118,.55);
  animation:iconGlow 3.2s ease-in-out infinite;
}
.icon-wa{
  background:linear-gradient(135deg,#25D366,#128C7E);
  border-color:rgba(255,255,255,.25);
  color:#fff;
  --glow:rgba(37,211,102,.55);
  animation:iconGlow 3.2s ease-in-out infinite;
  animation-delay:.4s;
}
.icon-vb{
  background:linear-gradient(135deg,#8f5cf2,#5b3fc9);
  border-color:rgba(255,255,255,.25);
  color:#fff;
  --glow:rgba(124,86,235,.55);
  animation:iconGlow 3.2s ease-in-out infinite;
  animation-delay:.8s;
}
.icon-call{
  background:linear-gradient(135deg,#2fd583,#1a9e63);
  border-color:rgba(255,255,255,.25);
  color:#fff;
  --glow:rgba(47,213,131,.55);
  animation:iconGlow 3.2s ease-in-out infinite;
  animation-delay:1.2s;
}
.icon-maps{
  background:conic-gradient(from 220deg,#4285F4 0deg,#34A853 90deg,#FBBC05 180deg,#EA4335 270deg,#4285F4 360deg);
  border-color:rgba(255,255,255,.25);
  color:#fff;
  --glow:rgba(66,133,244,.5);
  animation:iconGlow 3.2s ease-in-out infinite;
  animation-delay:1.6s;
}
.icon-fb{
  background:linear-gradient(135deg,#1877F2,#0C5DC7);
  border-color:rgba(255,255,255,.25);
  color:#fff;
  --glow:rgba(24,119,242,.55);
  animation:iconGlow 3.2s ease-in-out infinite;
  animation-delay:2s;
}

/* small "reachable now" pulse dot for direct-contact channels */
.status-dot{
  position:absolute;
  top:-3px;
  right:-3px;
  width:11px;
  height:11px;
  border-radius:50%;
  background:#3ddc74;
  border:2px solid #0a0a0a;
  box-shadow:0 0 0 rgba(61,220,116,.6);
  animation:dotPulse 2s ease-out infinite;
  z-index:2;
}

.link-text{
  display:flex;
  flex-direction:column;
  gap:2px;
  flex:1 1 auto;
  min-width:0;
}
.link-title{
  font-family:var(--arabic);
  font-weight:700;
  font-size:15.5px;
  color:var(--ink-0);
}
.link-sub{
  font-family:var(--sans);
  font-size:12.5px;
  color:var(--ink-2);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.link-arrow{
  flex:0 0 auto;
  font-size:16px;
  color:var(--ink-2);
  transition:transform .25s ease, color .25s ease;
}
.glass-link:hover .link-arrow{
  transform:translate(3px,-3px);
  color:var(--ink-0);
}

/* ---------- Install PWA Button ---------- */
.install-pwa-btn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  display:none;
  align-items:center;
  gap:8px;
  padding:12px 24px;
  border-radius:50px;
  background:linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  color:#fff;
  font-family:var(--arabic);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transition:all .3s ease;
  animation:slideUp .5s ease both;
}
.install-pwa-btn:hover{
  background:linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1));
  border-color:rgba(255,255,255,.4);
  transform:translateX(-50%) translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.install-pwa-btn:active{
  transform:translateX(-50%) translateY(0) scale(.98);
}
.install-pwa-btn svg{
  width:18px;
  height:18px;
}

/* ---------- footer ---------- */
.stage-footer{
  margin-top:auto;
  padding-top:40px;
  font-size:11.5px;
  letter-spacing:.3px;
  color:rgba(255,255,255,.35);
  text-align:center;
}

/* ---------- animations ---------- */
@keyframes fadeDown{
  from{opacity:0; transform:translateY(-14px);}
  to{opacity:1; transform:translateY(0);}
}
@keyframes riseIn{
  to{opacity:1; transform:translateY(0);}
}

@keyframes iconGlow{
  0%, 100%{ box-shadow:0 0 0 0 transparent, 0 4px 14px -4px rgba(0,0,0,.6); }
  50%{ box-shadow:0 0 16px 2px var(--glow), 0 4px 14px -4px rgba(0,0,0,.6); }
}

@keyframes dotPulse{
  0%{ box-shadow:0 0 0 0 rgba(61,220,116,.55); }
  70%{ box-shadow:0 0 0 7px rgba(61,220,116,0); }
  100%{ box-shadow:0 0 0 0 rgba(61,220,116,0); }
}

@keyframes drift{
  0%, 100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(30px,-20px) scale(1.08); }
}
@keyframes driftB{
  0%, 100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-25px,25px) scale(1.05); }
}

@keyframes haloSpin{
  to{ transform:rotate(360deg); }
}

@keyframes borderGlow{
  0%, 100%{
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 10px 30px -18px rgba(0,0,0,.9),
      0 0 0 0 transparent;
  }
  50%{
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 10px 30px -18px rgba(0,0,0,.9),
      0 0 18px 1px var(--accent);
  }
}

@keyframes textShimmer{
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}

@keyframes slideUp{
  from{opacity:0; transform:translateX(-50%) translateY(20px);}
  to{opacity:1; transform:translateX(-50%) translateY(0);}
}

@media (prefers-reduced-motion: reduce){
  .brand-block, .glass-link, .install-pwa-btn{animation:none !important; opacity:1 !important; transform:none !important;}
  .link-icon, .status-dot, .glow, .logo-ring::before, .brand-name{animation:none !important;}
}

@media (max-width:380px){
  .brand-name{font-size:28px; letter-spacing:3px;}
  .logo-ring{width:100px;height:100px;}
  .glass-link{padding:14px;}
  .install-pwa-btn{font-size:13px; padding:10px 18px;}
}

/* Offline indicator */
.offline-indicator{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:200;
  background:rgba(255,59,48,.9);
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:13px;
  font-family:var(--arabic);
  transform:translateY(-100%);
  transition:transform .3s ease;
}
.offline-indicator.show{
  transform:translateY(0);
}
</style>

<button class="install-pwa-btn" id="installBtn" aria-label="تثبيت التطبيق">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
  <span>تثبيت التطبيق</span>
</button>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const yearEl = document.getElementById('year');
  if (yearEl) yearEl.textContent = new Date().getFullYear();

  // gentle magnetic tilt on the logo ring, following the cursor (desktop only)
  const ring = document.querySelector('.logo-ring');
  if (ring && window.matchMedia('(hover: hover)').matches) {
    ring.addEventListener('mousemove', (e) => {
      const rect = ring.getBoundingClientRect();
      const x = (e.clientX - rect.left - rect.width / 2) / rect.width;
      const y = (e.clientY - rect.top - rect.height / 2) / rect.height;
      ring.style.transform = `rotateX(${(-y * 12).toFixed(2)}deg) rotateY(${(x * 12).toFixed(2)}deg)`;
    });
    ring.addEventListener('mouseleave', () => {
      ring.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });
    ring.style.transition = 'transform .25s ease';
    ring.style.transformStyle = 'preserve-3d';
  }

  // simple ripple feedback on tap for glass links
  document.querySelectorAll('.glass-link').forEach((link) => {
    link.addEventListener('pointerdown', (e) => {
      const rect = link.getBoundingClientRect();
      const ripple = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      ripple.style.position = 'absolute';
      ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
      ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.borderRadius = '50%';
      ripple.style.background = 'rgba(255,255,255,0.18)';
      ripple.style.pointerEvents = 'none';
      ripple.style.transform = 'scale(0)';
      ripple.style.transition = 'transform .5s ease, opacity .6s ease';
      ripple.style.opacity = '1';
      ripple.style.zIndex = '0';
      link.appendChild(ripple);
      requestAnimationFrame(() => {
        ripple.style.transform = 'scale(1)';
        ripple.style.opacity = '0';
      });
      setTimeout(() => ripple.remove(), 600);
    });
  });

  // ===== PWA Install Logic =====
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');

  // Listen for the beforeinstallprompt event
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';
  });

  // Handle install button click
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      installBtn.style.display = 'none';
    }
    deferredPrompt = null;
  });

  // Hide button if already installed
  window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
    deferredPrompt = null;
  });

  // ===== Offline Detection =====
  const offlineIndicator = document.getElementById('offlineIndicator');

  function updateOnlineStatus() {
    if (navigator.onLine) {
      offlineIndicator.classList.remove('show');
    } else {
      offlineIndicator.classList.add('show');
    }
  }

  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // ===== Service Worker Registration =====
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then((registration) => {
        console.log('Service Worker registered:', registration.scope);
      })
      .catch((error) => {
        console.log('Service Worker registration failed:', error);
      });
  }

  // ===== Video Background Fallback =====
  const video = document.getElementById('bgVideo');
  if (video) {
    // Ensure video plays (some browsers block autoplay)
    video.play().catch((err) => {
      console.log('Video autoplay blocked:', err);
      // Video poster will show as fallback
    });

    // Pause video when tab is hidden to save resources
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        video.pause();
      } else {
        video.play().catch(() => {});
      }
    });
  }
});
</script>
